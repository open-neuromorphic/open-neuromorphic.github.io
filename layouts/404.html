{{ define "main" }}
<script type="text/javascript">
  const redirectRules = {{ site.Data.redirects.redirects | jsonify | safeJS }};
  const currentPath = window.location.pathname;
  function wildcardMatch(pattern, str) {
    const regex = new RegExp('^' + pattern.split('*').map(s => s.replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&')).join('.*') + '$');
    return regex.test(str);
  }
  for (const rule of redirectRules) {
    if (wildcardMatch(rule.path, currentPath)) {
      window.location.href = rule.target;
      break;
    }
  }
</script>
<section class="section-sm text-center">
  <div class="container">
    <div class="row justify-center">
      <div class="sm:col-10 md:col-8 lg:col-6">
        <span class="text-[8rem] block font-bold text-dark dark:text-darkmode-dark">404</span>
        <h1 class="h2 mb-4">Page not found</h1>
        <div class="content">
          <p>The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.</p>
        </div>
        <a href="{{ site.BaseURL }}" class="btn btn-primary mt-8">Back to home</a>
      </div>
    </div>
  </div>
</section>
{{ end }}
