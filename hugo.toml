# hugo.toml — Build configuration only. Site params live in config/_default/params.toml.
baseURL = "https://open-neuromorphic.org/"
title = "Open Neuromorphic"
timeZone = "America/New_York"
pagerSize = 12
summaryLength = 10
hasCJKLanguage = false

[permalinks.page]
"pages" = "/:slug/"

[module]
[[module.mounts]]
source = "assets"
target = "assets"

[[module.mounts]]
source = "hugo_stats.json"
target = "assets/watching/hugo_stats.json"

[build]
noJSConfigInAssets = false
useResourceCacheWhen = 'fallback'
[build.buildStats]
enable = true
[[build.cachebusters]]
source = '(postcss|tailwind)\.config\.js'
target = 'css'
[[build.cachebusters]]
source = 'assets/.*\.(js|ts|jsx|tsx)'
target = 'js'
[[build.cachebusters]]
source = 'assets/.*\.(css|scss|sass)'
target = 'css'
[[build.cachebusters]]
source = 'data/.*\.(.*)$'
target = 'css'
[[build.cachebusters]]
source = 'assets/.*\.(.*)$'
target = '$1'

[outputs]
home = ["HTML", "RSS", "videoSitemap", "SearchIndex"]
section = ["HTML", "RSS"]

[imaging]
quality = 90
resampleFilter = "Lanczos"

[caches]
[caches.images]
dir = ":resourceDir/_gen"
maxAge = "720h"

[caches.assets]
dir = ":resourceDir/_gen"
maxAge = "720h"

[markup]
[markup.goldmark.renderer]
unsafe = true

[markup.highlight]
style = 'github-dark'

[markup.tableOfContents]
startLevel = 2
endLevel = 5
ordered = true

[mediaTypes]
[mediaTypes."application/manifest+json"]
suffixes = ["webmanifest"]

[outputFormats]
[outputFormats.WebAppManifest]
mediaType = "application/manifest+json"
rel = "manifest"

[outputFormats.SearchIndex]
mediaType = "application/json"
baseName = "searchindex"
isPlainText = true
notAlternative = true

[outputFormats.videoSitemap]
mediaType = "application/xml"
baseName = "video-sitemap"
isPlainText = false
notAlternative = true

[sitemap]
filename = 'sitemap.xml'
priority = 0

[Taxonomies]
category = "categories"
author = "authors"

[services]
[services.rss]
limit = 20
