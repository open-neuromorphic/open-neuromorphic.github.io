# config/_default/params.toml — Site parameters. Build configuration lives in hugo.toml.
favicon = "images/favicon.png"
logo = "images/logo.png"
logo_darkmode = "images/logo-darkmode.png"
logo_width = "350px"
logo_height = "54px"
logo_webp = true
logo_text = "Open Neuromorphic"
navbar_fixed = true
theme_switcher = true
theme_default = "system"
mainSections = ["blog","workshops"]
contact_form_action = "#"
google_tag_manager = ""
google_adsense = ""
custom_script = ""
copyright = "© 2022 - 2025 Open Neuromorphic"
homepageTitle = "Open Neuromorphic is a global community fostering education, research, and open-source collaboration in brain-inspired AI and hardware. "
defaultOgImage = "images/og-image.png"

[navigation_button]
enable = true
label = "Join Discord"
label_sub = "(3100+ joined)"
link = "https://discord.gg/hUygPUdD8E"

[search]
enable = true
primary_color = "#667eea"
include_sections = ["blog", "workshops", "neuromorphic-computing/hardware", "neuromorphic-computing/software", "contributors", "getting-involved", "neuromorphic-computing/initiatives", "volunteer-opportunities"]
show_image = false
show_description = true
show_tags = true
show_categories = true

[metadata]
keywords = ["neuromorphic computing", "artificial intelligence", "open source"]
description = "Explore the world of Neuromorphic Computing, AI, and Devices in an open-source community. Join us for educational content, and collaborative innovation"
author = "Open Neuromorphic"
image = "images/og-image.png"

[site_verification]
google = ""
bing = ""
baidu = ""
facebook = ""
mastodon = ""

[cookies]
enable = true
expire_days = 60
content = "This site uses cookies & analytics. By continuing to use this website, you agree to their use."
button = "I Accept"

[[plugins.js]]
link = "plugins/lazy-loader.js"

[[plugins.js]]
link = "plugins/youtube-lite.js"

[widgets]
sidebar = []

[subscription]
enable = false
